<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Book a call</title>
<style>
  :root {
    --bg: #f7f7f5; --card: #ffffff; --ink: #1a1a1a; --muted: #6b6b6b;
    --line: #e4e4e0; --accent: #2563eb; --accent-ink: #ffffff; --ok: #16a34a;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #101012; --card: #1a1a1e; --ink: #ececec; --muted: #9a9aa2;
            --line: #2a2a30; --accent: #3b82f6; --ok: #22c55e; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 24px 16px 64px; }
  h1 { font-size: 1.5rem; margin: 8px 0 4px; }
  .sub { color: var(--muted); margin: 0 0 20px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; }
  input, select, textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--bg); color: var(--ink); font: inherit; margin: 6px 0 14px;
  }
  button {
    background: var(--accent); color: var(--accent-ink); border: 0; border-radius: 8px;
    padding: 11px 18px; font: inherit; font-weight: 600; cursor: pointer; width: 100%;
  }
  button:disabled { opacity: .5; cursor: default; }
  .day { margin: 22px 0 8px; font-weight: 700; }
  .slots { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  .slot {
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 4px; text-align: center; cursor: pointer; font-variant-numeric: tabular-nums;
  }
  .slot:hover { border-color: var(--accent); color: var(--accent); }
  .slot.sel { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .slot.free { border-color: color-mix(in srgb, var(--ok) 55%, var(--line)); background: color-mix(in srgb, var(--ok) 8%, var(--card)); }
  .slot.conflict { border-color: color-mix(in srgb, #dc2626 55%, var(--line)); background: color-mix(in srgb, #dc2626 8%, var(--card)); opacity: .65; }
  .slot.conflict:hover { opacity: 1; }
  .connectbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
                border: 1px dashed var(--line); border-radius: 10px; padding: 10px 14px; margin: 0 0 6px;
                font-size: .9rem; color: var(--muted); }
  /* day-timeline view */
  .viewtoggle { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; margin-left: auto; }
  .viewtoggle button { width: auto; border-radius: 0; background: var(--card); color: var(--muted);
                       font-size: .8rem; padding: 6px 12px; font-weight: 500; }
  .viewtoggle button.on { background: var(--accent); color: var(--accent-ink); }
  .tl { position: relative; border: 1px solid var(--line); border-radius: 10px; background: var(--card); overflow: hidden; }
  .tlHour { position: absolute; left: 0; right: 0; border-top: 1px solid var(--line); opacity: .55; }
  .tlHour span { position: absolute; top: -1px; left: 6px; font-size: .68rem; color: var(--muted); background: var(--card); padding-right: 4px; }
  .tlBusy { position: absolute; left: 53%; right: 6px; background: color-mix(in srgb, var(--muted) 22%, var(--card));
            border: 1px solid color-mix(in srgb, var(--muted) 40%, var(--line)); border-radius: 6px;
            font-size: .7rem; color: var(--muted); padding: 2px 8px; overflow: hidden; }
  .tlSlot { position: absolute; left: 52px; width: calc(53% - 60px); border-radius: 6px; cursor: pointer;
            font-size: .78rem; display: flex; align-items: center; padding: 0 10px; font-variant-numeric: tabular-nums;
            background: color-mix(in srgb, var(--ok) 10%, var(--card));
            border: 1px solid color-mix(in srgb, var(--ok) 55%, var(--line)); color: var(--ink); }
  .tlSlot:hover { border-color: var(--accent); color: var(--accent); z-index: 3; }
  .tlSlot.conflict { background: color-mix(in srgb, #dc2626 9%, var(--card));
                     border-color: color-mix(in srgb, #dc2626 50%, var(--line)); opacity: .75; }
  .tlDayLabel { font-size: .7rem; color: var(--muted); position: absolute; right: 8px; top: 4px; }
  .connectbar button { width: auto; padding: 7px 14px; font-size: .9rem; }
  .legend { display: inline-flex; gap: 14px; }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; }
  .warnbadge { background: color-mix(in srgb, #dc2626 12%, var(--card)); border: 1px solid #dc2626;
               border-radius: 8px; padding: 8px 12px; margin: 0 0 12px; font-size: .9rem; }
  .tzbar { display: flex; align-items: center; gap: 8px; margin: 4px 0 8px; }
  .tzbar select { margin: 0; flex: 1; }
  .tzbar span { color: var(--muted); font-size: .85rem; white-space: nowrap; }
  .banner { background: color-mix(in srgb, var(--accent) 12%, var(--card)); border: 1px solid var(--accent);
            border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; font-size: .95rem; }
  .err { color: #dc2626; margin: 8px 0; min-height: 1.2em; }
  .ok-big { font-size: 2.4rem; }
  a { color: var(--accent); }
  .hidden { display: none; }
  .back { background: none; color: var(--muted); width: auto; padding: 4px 0; font-weight: 400; text-decoration: underline; }
  .spin { color: var(--muted); padding: 32px 0; text-align: center; }
</style>
</head>
<body>
<div class="wrap">

  <!-- password gate -->
  <div id="gate" class="hidden">
    <h1>Book a call</h1>
    <p class="sub">Enter the password from your invite link.</p>
    <div class="card">
      <input id="pw" type="password" placeholder="password" autocomplete="off" autofocus>
      <div id="gateErr" class="err"></div>
      <button id="pwGo">Continue</button>
    </div>
  </div>

  <!-- slot picker -->
  <div id="picker" class="hidden">
    <h1 id="title">Book a call</h1>
    <p class="sub" id="meta"></p>
    <div id="goldBanner" class="banner hidden"></div>
    <div class="tzbar">
      <span>Times shown in</span>
      <select id="tzSel"></select>
      <span class="viewtoggle"><button id="vList">list</button><button id="vDay">day</button></span>
    </div>
    <div id="connectBar" class="connectbar hidden"></div>
    <div id="days"></div>
    <div id="empty" class="spin hidden">No open times right now — check back soon.</div>
  </div>

  <!-- booking form -->
  <div id="form" class="hidden">
    <h1>Confirm your time</h1>
    <p class="sub" id="chosen"></p>
    <div id="conflictWarn" class="warnbadge hidden">⚠️ Heads up — your calendar looks busy at this time.</div>
    <div class="card">
      <label>Your name</label>
      <input id="name" autocomplete="name" placeholder="Ada Lovelace">
      <label>Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@example.com">
      <label>Anything to prepare? <span style="color:var(--muted)">(optional)</span></label>
      <textarea id="note" rows="3" placeholder="What would you like to talk about?"></textarea>
      <div id="formErr" class="err"></div>
      <button id="bookBtn">Book it</button>
      <button class="back" id="backBtn">← pick a different time</button>
    </div>
  </div>

  <!-- confirmation -->
  <div id="done" class="hidden">
    <div class="card" style="text-align:center">
      <div class="ok-big">✅</div>
      <h1 id="doneTitle">Booked!</h1>
      <p id="doneWhen" class="sub"></p>
      <p>A Google Calendar invite is on its way to your email.</p>
      <p id="meetP" class="hidden"><a id="meetA" href="#" target="_blank" rel="noopener">Google Meet link</a></p>
    </div>
  </div>

  <div id="loading" class="spin">Loading…</div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const show = (id) => ["gate","picker","form","done","loading"].forEach(x => $(x).classList.toggle("hidden", x !== id));

  const m = location.pathname.match(/^\/a\/([^/]+)$/);
  const token = m ? decodeURIComponent(m[1]) : null;
  let guestTz = Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";
  let data = null, selected = null;

  // ---- guest calendar overlay ----
  const GUEST_TTL = 30 * 60_000; // busy data goes stale after 30 min
  function guestCal() {
    try {
      const g = JSON.parse(sessionStorage.getItem("cal_guest"));
      if (g && g.busy && Date.now() - g.at < GUEST_TTL) return g;
    } catch {}
    return null;
  }
  function guestConflict(slot) {
    const g = guestCal();
    if (!g) return false;
    const s = Date.parse(slot.startUtc), e = Date.parse(slot.endUtc);
    return g.busy.some((b) => Date.parse(b.start) < e && Date.parse(b.end) > s);
  }
  function renderConnectBar() {
    const bar = $("connectBar");
    if (!data.overlay) return bar.classList.add("hidden");
    bar.classList.remove("hidden");
    const g = guestCal();
    if (g) {
      bar.innerHTML = `<span class="legend"><span><i style="background:var(--ok)"></i>works for both</span>` +
        `<span><i style="background:#dc2626"></i>you're busy</span></span>` +
        `<span>· ${g.email ? g.email.replace(/[<>&]/g, "") : "calendar connected"}</span>` +
        `<a href="#" id="disconnect">disconnect</a>`;
      bar.querySelector("#disconnect").onclick = (e) => {
        e.preventDefault(); sessionStorage.removeItem("cal_guest"); renderConnectBar(); setViewMode("list");
      };
    } else {
      const failed = sessionStorage.getItem("cal_guest_err");
      sessionStorage.removeItem("cal_guest_err");
      bar.innerHTML = (failed ? `<span>⚠️ Couldn't read that account's calendar — it may not use Google Calendar. Try another?</span>` :
        `<span>See which times work for you too:</span>`) +
        `<button id="connectBtn">📅 Connect your calendar</button>` +
        `<span style="font-size:.8rem">(only free/busy — we never see event details, nothing is stored)</span>`;
      bar.querySelector("#connectBtn").onclick = () => {
        location.href = `/oauth/guest/start?token=${encodeURIComponent(token)}`;
      };
    }
  }

  // ---- password gate ----
  function gate(msg) {
    show("gate");
    $("gateErr").textContent = msg || "";
    $("pw").focus();
  }
  $("pwGo").onclick = go;
  $("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
  function go() {
    const v = $("pw").value.trim();
    if (v) location.href = "/a/" + encodeURIComponent(v);
  }

  // ---- picker ----
  const fmtDay = (iso, tz) => new Intl.DateTimeFormat(undefined, { timeZone: tz, weekday: "long", month: "long", day: "numeric" }).format(new Date(iso));
  const fmtTime = (iso, tz) => new Intl.DateTimeFormat(undefined, { timeZone: tz, hour: "numeric", minute: "2-digit" }).format(new Date(iso));

  function tzOptions() {
    const sel = $("tzSel");
    let zones = [];
    try { zones = Intl.supportedValuesOf("timeZone"); } catch { zones = [guestTz, "UTC", data.ownerTz]; }
    if (!zones.includes(guestTz)) zones.unshift(guestTz);
    sel.innerHTML = zones.map(z => `<option ${z === guestTz ? "selected" : ""}>${z}</option>`).join("");
    sel.onchange = () => { guestTz = sel.value; renderDays(); };
  }

  // minutes since local midnight (in guestTz) for an instant — the
  // coordinate space of the timeline, DST-safe because Intl does the math
  function localMin(iso) {
    const p = new Intl.DateTimeFormat("en-US", { timeZone: guestTz, hour: "2-digit", minute: "2-digit", hour12: false })
      .formatToParts(new Date(iso));
    return (+p.find((x) => x.type === "hour").value % 24) * 60 + +p.find((x) => x.type === "minute").value;
  }
  const dayKeyOf = (iso) => new Intl.DateTimeFormat("en-CA", { timeZone: guestTz, year: "numeric", month: "2-digit", day: "2-digit" }).format(new Date(iso));

  let viewMode = null; // "list" | "day" — default set in openPicker
  function setViewMode(m) {
    viewMode = m;
    $("vList").classList.toggle("on", m === "list");
    $("vDay").classList.toggle("on", m === "day");
    renderDays();
  }

  function renderDays() {
    const byDay = new Map();
    for (const s of data.slots) {
      const k = dayKeyOf(s.startUtc);
      if (!byDay.has(k)) byDay.set(k, { label: fmtDay(s.startUtc, guestTz), slots: [] });
      byDay.get(k).slots.push(s);
    }
    $("days").innerHTML = "";
    $("empty").classList.toggle("hidden", data.slots.length > 0);
    for (const [key, day] of byDay) {
      const h = document.createElement("div"); h.className = "day"; h.textContent = day.label;
      $("days").append(h, viewMode === "day" ? buildTimeline(key, day) : buildChips(day));
    }
  }

  function buildChips(day) {
    const grid = document.createElement("div"); grid.className = "slots";
    const connected = !!guestCal();
    for (const s of day.slots) {
      const b = document.createElement("div"); b.className = "slot";
      if (connected) b.classList.add(guestConflict(s) ? "conflict" : "free");
      b.textContent = fmtTime(s.startUtc, guestTz);
      b.onclick = () => { selected = s; openForm(); };
      grid.appendChild(b);
    }
    return grid;
  }

  // Day view: the guest's whole day as a timeline — their busy blocks on the
  // right, bookable start-times overlaid on the left, red where they collide.
  function buildTimeline(key, day) {
    const PX = 1.05; // px per minute
    const g = guestCal();
    // Guest busy clipped to this local day, in local-minute space.
    const busy = (g ? g.busy : []).map((b) => {
      const sDay = dayKeyOf(b.start), eDay = dayKeyOf(b.end);
      if (sDay !== key && eDay !== key) return null;
      return { s: sDay === key ? localMin(b.start) : 0, e: eDay === key ? localMin(b.end) : 1440 };
    }).filter((b) => b && b.e > b.s);

    const starts = day.slots.map((s) => localMin(s.startUtc));
    const ends = day.slots.map((s) => localMin(s.endUtc) || 1440);
    let lo = Math.min(...starts, ...(busy.length ? busy.map((b) => b.s) : [Infinity]), 8 * 60);
    let hi = Math.max(...ends, ...(busy.length ? busy.map((b) => b.e) : [0]), 18 * 60);
    lo = Math.max(0, Math.floor(lo / 60) * 60 - 30);
    hi = Math.min(1440, Math.ceil(hi / 60) * 60 + 30);

    const tl = document.createElement("div"); tl.className = "tl";
    tl.style.height = `${(hi - lo) * PX}px`;
    for (let m = Math.ceil(lo / 60) * 60; m <= hi; m += 60) {
      const line = document.createElement("div"); line.className = "tlHour";
      line.style.top = `${(m - lo) * PX}px`;
      const hh = m / 60 % 24;
      line.innerHTML = `<span>${((hh + 11) % 12) + 1}${hh < 12 ? "am" : "pm"}</span>`;
      tl.appendChild(line);
    }
    if (g) {
      const lbl = document.createElement("div"); lbl.className = "tlDayLabel"; lbl.textContent = "your calendar";
      tl.appendChild(lbl);
      for (const b of busy) {
        const el = document.createElement("div"); el.className = "tlBusy";
        el.style.top = `${(Math.max(b.s, lo) - lo) * PX}px`;
        el.style.height = `${(Math.min(b.e, hi) - Math.max(b.s, lo)) * PX - 2}px`;
        el.textContent = "busy";
        tl.appendChild(el);
      }
    }
    // Bookable start chips: one per slot start, sized to the start-step so
    // overlapping 60-min candidates don't stack; click books the full slot.
    const step = day.slots.length > 1
      ? Math.min(...day.slots.slice(1).map((s, i) => localMin(s.startUtc) - localMin(day.slots[i].startUtc)).filter((d) => d > 0))
      : 60;
    for (const s of day.slots) {
      const chip = document.createElement("div"); chip.className = "tlSlot";
      if (g && guestConflict(s)) chip.classList.add("conflict");
      chip.style.top = `${(localMin(s.startUtc) - lo) * PX + 1}px`;
      chip.style.height = `${step * PX - 4}px`;
      chip.textContent = fmtTime(s.startUtc, guestTz);
      chip.title = `${fmtTime(s.startUtc, guestTz)} – ${fmtTime(s.endUtc, guestTz)}`;
      chip.onclick = () => { selected = s; openForm(); };
      tl.appendChild(chip);
    }
    return tl;
  }

  function openPicker() {
    show("picker");
    $("title").textContent = `Book a call with ${data.ownerName}`;
    $("meta").textContent = `${data.durationMin}-minute call · pick a time below`;
    if (data.pickAnything) {
      $("goldBanner").classList.remove("hidden");
      $("goldBanner").textContent = `Golden ticket: pick any time that works for you — ${data.ownerName} will move things around to be there.`;
    }
    tzOptions();
    renderConnectBar();
    $("vList").onclick = () => setViewMode("list");
    $("vDay").onclick = () => setViewMode("day");
    // Connected guests default to the day view — that's the whole point of
    // connecting; everyone else starts on the compact list.
    setViewMode(guestCal() ? "day" : "list");
  }

  // ---- form ----
  function openForm() {
    show("form");
    $("chosen").textContent = `${fmtDay(selected.startUtc, guestTz)} · ${fmtTime(selected.startUtc, guestTz)}–${fmtTime(selected.endUtc, guestTz)} (${guestTz})`;
    $("conflictWarn").classList.toggle("hidden", !guestConflict(selected));
    const g = guestCal();
    if (g && g.email && !$("email").value) $("email").value = g.email;
    $("formErr").textContent = "";
    $("name").focus();
  }
  $("backBtn").onclick = () => show("picker");
  $("bookBtn").onclick = async () => {
    const name = $("name").value.trim(), email = $("email").value.trim();
    if (!name) return $("formErr").textContent = "Name required.";
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return $("formErr").textContent = "Valid email required.";
    $("bookBtn").disabled = true; $("bookBtn").textContent = "Booking…";
    try {
      const r = await fetch("/api/book", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, startUtc: selected.startUtc, name, email, note: $("note").value.trim() }),
      });
      const j = await r.json();
      if (!r.ok) {
        $("bookBtn").disabled = false; $("bookBtn").textContent = "Book it";
        if (r.status === 409) { $("formErr").textContent = j.error; await load(); show("picker"); renderDays(); }
        else $("formErr").textContent = j.error || "Something went wrong.";
        return;
      }
      $("doneWhen").textContent = `${fmtDay(j.startUtc, guestTz)} · ${fmtTime(j.startUtc, guestTz)}–${fmtTime(j.endUtc, guestTz)} (${guestTz})`;
      if (j.meetLink) { $("meetP").classList.remove("hidden"); $("meetA").href = j.meetLink; }
      show("done");
    } catch {
      $("bookBtn").disabled = false; $("bookBtn").textContent = "Book it";
      $("formErr").textContent = "Network error — try again.";
    }
  };

  // ---- boot ----
  async function load() {
    const r = await fetch(`/api/slots?token=${encodeURIComponent(token)}`);
    if (!r.ok) throw Object.assign(new Error("bad token"), { status: r.status });
    data = await r.json();
  }
  (async () => {
    if (!token) return gate();
    try { await load(); openPicker(); }
    catch (e) { gate(e.status === 404 ? "That password/link isn't valid." : "Couldn't load — try again."); }
  })();
})();
</script>
</body>
</html>
